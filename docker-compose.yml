services:
  palm:
    build: .
    ports:
      - "${PALM_PUBLISH_PORT:-8080}:8080"
    environment:
      PYTHONUNBUFFERED: "1"
      PALM_STORAGE_BACKEND: filesystem
      PALM_DATA_DIR: /data
      PALM_SERVER_HOST: 0.0.0.0
      PALM_SERVER_PORT: "8080"
      PALM_LOAD_EXAMPLE_DEFINITIONS: true
      PALM_LOG_FILE: /var/log/palm/palm.log
      PALM_LLMS_TXT: docs/mcp.txt
    volumes:
      - ./data:/data
      - ./logs:/var/log/palm
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s