<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Palm Analytics</title>
  <link rel="stylesheet" href="/analytics/analytics.css" />
</head>
<body>
  <header class="top">
    <h1>Palm Analytics</h1>
    <p class="sub">Dashboards + datasets via <code>/v1/api/analytics/*</code></p>
  </header>
  <main>
    <section class="card">
      <label for="dashboard">Dashboard</label>
      <div class="row">
        <select id="dashboard"></select>
        <button type="button" id="btn-refresh">Refresh</button>
        <button type="button" id="btn-load" class="primary">Render</button>
      </div>
      <p id="meta" class="meta"></p>
    </section>
    <div id="tiles" class="tiles"></div>
    <section class="card">
      <label for="dataset">Or single dataset</label>
      <div class="row">
        <select id="dataset"></select>
        <button type="button" id="btn-load-ds">Load dataset</button>
      </div>
      <div class="table-wrap"><table id="table"><thead></thead><tbody></tbody></table></div>
      <canvas id="chart" width="640" height="240"></canvas>
    </section>
    <p id="error" class="error" hidden></p>
  </main>
  <script src="/analytics/analytics.js"></script>
</body>
</html>
