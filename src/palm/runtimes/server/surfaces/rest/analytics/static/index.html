<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Palm Analytics</title>
  <link rel="stylesheet" href="/analytics/analytics.css" />
</head>
<body>
  <header class="top">
    <h1>Palm Analytics</h1>
    <p class="sub">Dogfood — published definition datasets via <code>/v1/api/analytics/*</code>
      (e.g. <code>palm-todos</code> from <strong>todo-builder</strong>)</p>
  </header>
  <main>
    <section class="card">
      <label for="dataset">Dataset</label>
      <div class="row">
        <select id="dataset"></select>
        <button type="button" id="btn-refresh">Refresh list</button>
        <button type="button" id="btn-load" class="primary">Load</button>
      </div>
      <p id="meta" class="meta"></p>
    </section>
    <section class="card">
      <h2>Table</h2>
      <div class="table-wrap"><table id="table"><thead></thead><tbody></tbody></table></div>
    </section>
    <section class="card">
      <h2>Chart</h2>
      <canvas id="chart" width="640" height="240"></canvas>
    </section>
    <p id="error" class="error" hidden></p>
  </main>
  <script src="/analytics/analytics.js"></script>
</body>
</html>
